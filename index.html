<!DOCTYPE html>
<html lang="">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="dark only">
  <link rel="icon" href="/favicon.ico">
  <!-- CSP meta tag injected by vite.config.ts at build time -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sol Keeper">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/images/icons/icon_192x192.png">
  <title>Sol Keeper — Gravity Clicker</title>
  <style>
      /* Static splash — renders instantly before any JS loads */
      body {
          margin: 0;
          background: #0d1117;
      }

      #static-splash {
          position: fixed;
          inset: 0;
          z-index: 9999;
          display: flex;
          align-items: center;
          justify-content: center;
          background-color: #0d1117;
          background-image: url('/images/bg/bg_800x450.webp');
          background-repeat: no-repeat;
          background-size: cover;
          background-position: center center;
          transition: opacity 0.4s ease-out;
      }

      #static-splash.hidden {
          opacity: 0;
          pointer-events: none;
      }

      #static-splash img {
          width: 40vmin;
          height: 40vmin;
          max-width: 256px;
          max-height: 256px;
          object-fit: contain;
          animation: splash-pulse 1.5s ease-in-out infinite;
      }

      @keyframes splash-pulse {
          0%, 100% {
              opacity: 0.3;
          }
          50% {
              opacity: 0.7;
          }
      }
  </style>
</head>
<body>
<!-- Static splash screen — visible before JS loads -->
<link rel="preload" href="/images/bg/bg_800x450.webp" as="image" type="image/webp">
<div id="static-splash">
  <img src="/images/logo/logo_256x256.webp" alt="Loading...">
</div>
<!-- Load the SDK before your game code -->
<script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
<div id="app"></div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
